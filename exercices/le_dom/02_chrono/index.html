<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice - Chronomètre</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Chronomètre</h1>
        <div id="affichage" class="temps">00:00:00</div>
        
        <div class="controles">
            <button id="btn-start">Démarrer</button>
            <button id="btn-pause" disabled>Pause</button>
            <button id="btn-reset">Réinitialiser</button>
        </div>
    </div>

    <!-- Script inclus avec type="module" (permet l'utilisation depuis Vite) -->
    <script type="module" src="main.js"></script>
</body>
</html>
